name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  regression-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install bot dependencies
        working-directory: omni-bot
        run: npm ci

      - name: Run regression tests
        run: npm test -- --reporter=verbose

  version-and-release:
    needs: regression-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Read version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="v${VERSION}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version from package.json: $TAG"

      - name: Check if tag already exists
        id: tag_check
        run: |
          if git tag -l "${{ steps.version.outputs.tag }}" | grep -q .; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Tag ${{ steps.version.outputs.tag }} already exists — skipping release"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Generate CHANGELOG entry
        id: changelog
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          LATEST=$(git tag -l 'v*' | sort -V | tail -1)
          LATEST=${LATEST:-v0.0.0}
          TAG="${{ steps.version.outputs.tag }}"
          DATE=$(date '+%Y-%m-%d')

          COMMITS=$(git log ${LATEST}..HEAD --pretty=format:"%s" 2>/dev/null || git log --pretty=format:"%s")

          FEATS=$(echo "$COMMITS" | grep -E '^feat(\(.+\))?(!)?:' || true)
          FIXES=$(echo "$COMMITS" | grep -E '^fix(\(.+\))?:' || true)
          DOCS=$(echo "$COMMITS" | grep -E '^docs(\(.+\))?:' || true)
          BREAKING=$(echo "$COMMITS" | grep -E '(BREAKING CHANGE|!:)' || true)

          ENTRY="## [$TAG] - $DATE\n"
          [ -n "$BREAKING" ] && ENTRY="${ENTRY}\n### Breaking Changes\n$(echo "$BREAKING" | sed 's/^/- /')\n"
          [ -n "$FEATS" ]    && ENTRY="${ENTRY}\n### Features\n$(echo "$FEATS" | sed 's/^/- /')\n"
          [ -n "$FIXES" ]    && ENTRY="${ENTRY}\n### Bug Fixes\n$(echo "$FIXES" | sed 's/^/- /')\n"
          [ -n "$DOCS" ]     && ENTRY="${ENTRY}\n### Documentation\n$(echo "$DOCS" | sed 's/^/- /')\n"

          if [ -f CHANGELOG.md ]; then
            TMPFILE=$(mktemp)
            echo -e "$ENTRY" > "$TMPFILE"
            cat CHANGELOG.md >> "$TMPFILE"
            mv "$TMPFILE" CHANGELOG.md
          else
            echo -e "# Changelog\n\n$ENTRY" > CHANGELOG.md
          fi

          echo "entry<<EOF" >> $GITHUB_OUTPUT
          echo -e "$ENTRY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Commit CHANGELOG and tag
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git diff --cached --quiet || git commit -m "docs: update CHANGELOG for ${{ steps.version.outputs.tag }}"
          git tag -a "${{ steps.version.outputs.tag }}" -m "Release ${{ steps.version.outputs.tag }}"
          git push origin main --follow-tags

      - name: Create GitHub Release
        if: steps.tag_check.outputs.exists == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: '${{ steps.version.outputs.tag }}',
              name: 'Release ${{ steps.version.outputs.tag }}',
              body: `${{ steps.changelog.outputs.entry }}`,
              draft: false,
              prerelease: false
            });
