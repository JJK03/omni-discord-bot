name: Integration Tests

on:
  pull_request:
    branches: [develop]

permissions:
  contents: read
  pull-requests: write

jobs:
  node-integration-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install bot dependencies
        working-directory: omni-bot
        run: npm ci
        env:
          YOUTUBE_DL_SKIP_DOWNLOAD: true

      - name: Run integration tests
        run: npm test -- --reporter=verbose

  comment-results:
    needs: node-integration-test
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Post PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const node = '${{ needs.node-integration-test.result }}';
            const status = (r) => r === 'success' ? '✓ Pass' : r === 'skipped' ? '— Skipped' : '✗ Fail';

            const body = [
              '## Integration Test Results',
              '',
              '| Target | Status |',
              '|--------|--------|',
              `| Node/TS (omni-bot) | ${status(node)} |`,
              '',
              `Run: [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})`,
            ].join('\n');

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
